<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERNOTE - ERADA PLUS</title>
  <style>
    :root{--bg:#eef5fb;--navy:#102a43;--blue:#1769aa;--sky:#d8ecfb;--white:#fff;--red:#e63946;--green:#1f9d55;--gold:#c79a28;--muted:#6b7c93;--shadow:0 18px 50px rgba(16,42,67,.14);--radius:24px}
    *{box-sizing:border-box} body{margin:0;font-family:Tahoma,Arial,sans-serif;background:linear-gradient(135deg,#eef5fb,#ffffff 45%,#d9edff);color:var(--navy)}
    .app{display:grid;grid-template-columns:280px 1fr;min-height:100vh}.side{background:linear-gradient(180deg,#0f2742,#164b78);color:#fff;padding:24px;position:sticky;top:0;height:100vh;box-shadow:var(--shadow)}
    .brand{display:flex;gap:12px;align-items:center;margin-bottom:25px}.logo{width:56px;height:56px;border-radius:18px;background:linear-gradient(135deg,var(--gold),#ffe08a);display:grid;place-items:center;color:#102a43;font-weight:900;font-size:22px}.brand h1{font-size:20px;margin:0}.brand p{margin:4px 0 0;color:#cfe6fa;font-size:12px}.nav button{width:100%;border:0;border-radius:16px;background:transparent;color:#d9efff;padding:14px 16px;margin:5px 0;text-align:right;font-size:15px;cursor:pointer}.nav button.active,.nav button:hover{background:rgba(255,255,255,.13);color:#fff}.main{padding:28px}.top{display:flex;justify-content:space-between;gap:15px;align-items:center;margin-bottom:22px}.top h2{margin:0;font-size:28px}.top small{color:var(--muted)}.actions{display:flex;gap:10px;flex-wrap:wrap}.btn{border:0;border-radius:14px;padding:12px 16px;font-weight:700;cursor:pointer;background:var(--blue);color:#fff}.btn.red{background:var(--red)}.btn.green{background:var(--green)}.btn.gold{background:var(--gold);color:#17233b}.grid{display:grid;grid-template-columns:repeat(4,minmax(180px,1fr));gap:18px}.card{background:rgba(255,255,255,.85);border:1px solid rgba(23,105,170,.13);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);cursor:pointer;transition:.2s;position:relative;overflow:hidden}.card:hover{transform:translateY(-4px)}.card:before{content:"";position:absolute;inset:auto -30px -40px auto;width:130px;height:130px;border-radius:50%;background:rgba(23,105,170,.09)}.card .icon{font-size:30px}.card h3{margin:12px 0 10px;font-size:17px}.num{font-size:34px;font-weight:900}.value{color:var(--muted);margin-top:7px}.section{display:none}.section.active{display:block}.wide{grid-column:span 2}.redGlow{border-color:rgba(230,57,70,.35);background:linear-gradient(135deg,#fff,#fff3f4)}.greenGlow{border-color:rgba(31,157,85,.25)}.goldGlow{border-color:rgba(199,154,40,.35)}.tableWrap{background:#fff;border-radius:22px;box-shadow:var(--shadow);overflow:hidden;margin-top:20px}table{width:100%;border-collapse:collapse}th,td{padding:13px;border-bottom:1px solid #edf2f7;text-align:right;font-size:14px}th{background:#f0f7ff;color:#173b5f}.badge{padding:6px 10px;border-radius:999px;background:#e7f1fb;color:#1769aa;font-size:12px;font-weight:700}.modal{position:fixed;inset:0;background:rgba(8,25,43,.55);display:none;align-items:center;justify-content:center;padding:18px;z-index:5}.modal.show{display:flex}.box{width:min(1150px,96vw);max-height:88vh;overflow:auto;background:#fff;border-radius:28px;box-shadow:0 30px 80px rgba(0,0,0,.25);padding:22px}.boxHead{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:15px}.form{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;background:#f8fbff;padding:16px;border-radius:20px;margin-bottom:15px}input,select,textarea{width:100%;border:1px solid #d8e6f3;border-radius:13px;padding:11px;background:#fff;font-family:inherit}textarea{min-height:42px}.close{background:#eef3f7;color:#102a43}.footer{margin-top:24px;color:var(--muted);font-size:12px;text-align:center}@media(max-width:950px){.app{grid-template-columns:1fr}.side{height:auto;position:relative}.grid{grid-template-columns:1fr 1fr}.form{grid-template-columns:1fr}.wide{grid-column:span 1}}@media(max-width:600px){.grid{grid-template-columns:1fr}.top{display:block}.actions{margin-top:12px}}
  </style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand"><div class="logo">E+</div><div><h1>ERNOTE</h1><p>BY ERADA PLUS CO.LLC</p></div></div>
    <div class="nav">
      <button class="active" onclick="show('home',this)">🏠 لوحة التحكم</button>
      <button onclick="show('visits',this)">🛠 إدارة الزيارات الشهرية</button>
      <button onclick="show('sales',this)">📈 إدارة المبيعات</button>
      <button onclick="show('accounting',this)">💰 الحسابات والتحصيل</button>
      <button onclick="show('contracts',this)">📄 العقود والتقارير</button>
    </div>
  </aside>
  <main class="main">
    <div class="top"><div><h2 id="title">لوحة التحكم الرئيسية</h2><small>نظام إدارة الصيانة، العروض، العقود، التحصيل والأرشيف</small></div><div class="actions"><button class="btn green" onclick="openModal(currentModule)">+ إضافة عملية</button><button class="btn gold" onclick="seedData()">بيانات تجريبية</button><button class="btn red" onclick="clearAll()">تصفير النظام</button></div></div>
    <section id="home" class="section active"><div id="homeGrid" class="grid"></div></section>
    <section id="visits" class="section"><div id="visitsGrid" class="grid"></div></section>
    <section id="sales" class="section"><div id="salesGrid" class="grid"></div></section>
    <section id="accounting" class="section"><div id="accountingGrid" class="grid"></div></section>
    <section id="contracts" class="section"><div id="contractsGrid" class="grid"></div></section>
    <div class="footer">00966542800242 — ERADAPLS@GMAIL.COM</div>
  </main>
</div>
<div class="modal" id="modal"><div class="box"><div class="boxHead"><h2 id="modalTitle">التفاصيل</h2><div><button class="btn gold" onclick="exportCSV()">تصدير Excel CSV</button> <button class="btn close" onclick="closeModal()">إغلاق</button></div></div><div class="form" id="form"></div><div class="tableWrap"><table><thead id="thead"></thead><tbody id="tbody"></tbody></table></div></div></div>
<script>
const stages={
 visits:{title:'إدارة الزيارات الشهرية',icon:'🛠',fields:['client','phone','location','engineer','amount','note'],cards:[['A','زيارات شهرية جديدة','تظهر الزيارات المستحقة هذا الشهر','🗓'],['B','تمت الزيارة ولم يرسل عرض','زيارات بها أعطال تحتاج عرض','🔍'],['C','تم تجهيز عرض الصيانة','العروض الجاهزة للإرسال','🧾'],['D','تم إرسال العرض للعميل','بانتظار موافقة العميل','📤']]},
 sales:{title:'إدارة المبيعات',icon:'📈',fields:['client','phone','location','engineer','amount','note'],cards:[['A1','عميل جديد','طلبات العملاء الجدد','👤'],['B1','تم إرسال العرض','عروض تم إرسالها للعميل','📨'],['C1','متابعة العرض','متابعة يومية مع العميل','⏳'],['D1','تم التعميد','عقود أو أوامر شراء معتمدة','✅']]},
 accounting:{title:'الحسابات والتحصيل',icon:'💰',fields:['client','phone','location','engineer','amount','note'],cards:[['INV','تحصيل الدفعات','دفعات مستحقة للتحصيل','💵'],['PAID','تم التحصيل','مبالغ تم تحصيلها','✅'],['DUE','دفعات متأخرة','دفعات تحتاج متابعة','🚨']]},
 contracts:{title:'العقود والتقارير',icon:'📄',fields:['client','phone','location','engineer','amount','note'],cards:[['ALL','جميع العقود','عدد العقود وقيمتها','📚'],['REPORT','التقارير الفنية','تقارير PDF وروابط مرفوعة','📎'],['EXP','عقود شارفت على الانتهاء','15 يوم أو أقل','🔴'],['ARCH','الأرشيف','لم يتم أو لم يرصد أو لم يرسل عرض','🗄']]}
};
const labels={client:'اسم العميل',phone:'رقم الجوال',location:'الموقع',engineer:'المسؤول',amount:'القيمة',note:'ملاحظات / رابط تقرير'};
let data=JSON.parse(localStorage.getItem('ernoteData')||'[]'), currentModule='visits', currentStage=null;
function save(){localStorage.setItem('ernoteData',JSON.stringify(data));render()}
function show(id,btn){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));btn&&btn.classList.add('active');currentModule=id==='home'?'visits':id;document.getElementById('title').textContent=id==='home'?'لوحة التحكم الرئيسية':stages[id].title;render()}
function sum(arr){return arr.reduce((a,b)=>a+(+b.amount||0),0).toLocaleString('en-US')}
function count(module,stage){return data.filter(x=>x.module===module && (stage?x.stage===stage:true))}
function card(module,c){let arr=count(module,c[0]);let cls=c[0]==='EXP'||c[0]==='DUE'?'redGlow':c[0].includes('D')||c[0]==='PAID'?'greenGlow':'goldGlow';return `<div class="card ${cls}" onclick="openModal('${module}','${c[0]}')"><div class="icon">${c[3]}</div><h3>${c[1]}</h3><div class="num">${arr.length}</div><div class="value">القيمة: ${sum(arr)} ريال</div><small>${c[2]}</small></div>`}
function renderGrid(module){document.getElementById(module+'Grid').innerHTML=stages[module].cards.map(c=>card(module,c)).join('')}
function render(){['visits','sales','accounting','contracts'].forEach(renderGrid);document.getElementById('homeGrid').innerHTML=[...stages.visits.cards.map(c=>card('visits',c)),...stages.sales.cards.map(c=>card('sales',c)),...stages.accounting.cards.map(c=>card('accounting',c)),...stages.contracts.cards.map(c=>card('contracts',c))].join('')}
function openModal(module='visits',stage=null){currentModule=module;currentStage=stage;let mod=stages[module];let stageName=stage?(mod.cards.find(c=>c[0]===stage)||[])[1]:'إضافة عامة';document.getElementById('modalTitle').textContent=mod.title+' - '+stageName;document.getElementById('modal').classList.add('show');buildForm();buildTable()}
function closeModal(){document.getElementById('modal').classList.remove('show')}
function buildForm(){let mod=stages[currentModule];let options=mod.cards.map(c=>`<option value="${c[0]}" ${currentStage===c[0]?'selected':''}>${c[1]}</option>`).join('');document.getElementById('form').innerHTML=`<input id="client" placeholder="اسم العميل"><input id="phone" placeholder="رقم الجوال"><input id="location" placeholder="الموقع"><input id="engineer" placeholder="المسؤول"><input id="amount" type="number" placeholder="القيمة"><select id="stage">${options}</select><textarea id="note" placeholder="ملاحظات / رابط تقرير PDF"></textarea><button class="btn green" onclick="addItem()">حفظ العملية</button>`}
function addItem(){let item={id:Date.now(),module:currentModule,stage:document.getElementById('stage').value,client:val('client'),phone:val('phone'),location:val('location'),engineer:val('engineer'),amount:val('amount'),note:val('note'),date:new Date().toLocaleDateString('ar-SA')};data.push(item);save();buildTable();buildForm()}
function val(id){return document.getElementById(id).value.trim()}
function buildTable(){let mod=stages[currentModule];let rows=data.filter(x=>x.module===currentModule && (!currentStage||x.stage===currentStage));document.getElementById('thead').innerHTML='<tr><th>#</th><th>العميل</th><th>الجوال</th><th>الموقع</th><th>المسؤول</th><th>القيمة</th><th>الحالة</th><th>ملاحظات</th><th>إجراء</th></tr>';document.getElementById('tbody').innerHTML=rows.map((x,i)=>`<tr><td>${i+1}</td><td>${x.client||'-'}</td><td>${x.phone||'-'}</td><td>${x.location||'-'}</td><td>${x.engineer||'-'}</td><td>${(+x.amount||0).toLocaleString('en-US')}</td><td><select onchange="move(${x.id},this.value)">${mod.cards.map(c=>`<option value="${c[0]}" ${x.stage===c[0]?'selected':''}>${c[1]}</option>`).join('')}</select></td><td>${x.note||'-'}</td><td><button class="btn red" onclick="del(${x.id})">حذف</button></td></tr>`).join('')||'<tr><td colspan="9">لا توجد بيانات</td></tr>'}
function move(id,stage){let x=data.find(i=>i.id===id); if(x){x.stage=stage; save(); buildTable()}}
function del(id){if(confirm('حذف السجل؟')){data=data.filter(x=>x.id!==id);save();buildTable()}}
function exportCSV(){let rows=data.filter(x=>x.module===currentModule && (!currentStage||x.stage===currentStage));let csv='client,phone,location,engineer,amount,stage,note,date\n'+rows.map(x=>[x.client,x.phone,x.location,x.engineer,x.amount,x.stage,x.note,x.date].map(v=>'"'+String(v||'').replaceAll('"','""')+'"').join(',')).join('\n');let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));a.download='ernote-export.csv';a.click()}
function seedData(){data=[{id:1,module:'visits',stage:'A',client:'فندق فيو',phone:'0500000000',location:'المدينة',engineer:'أحمد',amount:240,note:'زيارة شهرية مستحقة',date:'اليوم'},{id:2,module:'visits',stage:'B',client:'برج السلام',phone:'0551111111',location:'قباء',engineer:'محمد',amount:0,note:'مضخة تحتاج صيانة',date:'اليوم'},{id:3,module:'sales',stage:'A1',client:'مجمع تجاري',phone:'0562222222',location:'العزيزية',engineer:'المبيعات',amount:5000,note:'عميل جديد',date:'اليوم'},{id:4,module:'sales',stage:'D1',client:'مصنع المدينة',phone:'0573333333',location:'الصناعية',engineer:'عثمان',amount:18000,note:'تم التعميد',date:'اليوم'},{id:5,module:'accounting',stage:'INV',client:'مصنع المدينة',phone:'0573333333',location:'الصناعية',engineer:'المحاسب',amount:9000,note:'الدفعة الأولى',date:'اليوم'},{id:6,module:'contracts',stage:'EXP',client:'فندق قديم',phone:'0584444444',location:'المركزية',engineer:'خالد',amount:12000,note:'باقي 12 يوم',date:'اليوم'}];save()}
function clearAll(){if(confirm('سيتم حذف كل البيانات')){data=[];save()}}
render();
</script>
</body>
</html>
